<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎加入資訊志工隊!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ecf0f3;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        main {
            position: relative;
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            margin: 3em auto;
            padding: 2em;
            background-color: #ecf0f3;
            box-shadow: 10px 10px 10px #d1d9e6, -10px -10px 10px #f9f9f9;
            border-radius: 12px;
            overflow: hidden;
        }

        main>* {
            z-index: 2;
            position: relative;
            color: #6b6f70;
        }

        .circle {
            border-radius: 50%;
            background-color: #ecf0f3;
            box-shadow: inset 8px 8px 12px #d1d9e6, inset -8px -8px 12px #f9f9f9;
            bottom: -60%;
            position: absolute;
            right: 3em;
            top: -170px;
            width: 300px;
            height: 300px;
            z-index: 1;
        }

        .c2 {
            width: 500px;
            height: 500px;
            top: calc(100% - 200px);
            right: -2em;
        }

        h1 {
            font-size: 2em;
            font-weight: 700;
            margin: .5em 0;
            color: #181818;
        }

        p {
            color: #808689;
            line-height: 1.6;
        }

        input[type="text"] {
            width: 350px;
            height: 40px;
            margin: 4px 0;
            padding-left: 25px;
            font-size: 13px;
            letter-spacing: 0.15px;
            border: none;
            outline: transparent;
            background-color: #ecf0f3;
            transition: 0.25s ease;
            border-radius: 8px;
            box-shadow: inset 2px 2px 4px #d1d9e6, inset -2px -2px 4px #f9f9f9;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 4px 0;
            padding-left: 25px;
            font-size: 13px;
            letter-spacing: 0.15px;
            border: none;
            outline: transparent;
            background-color: #ecf0f3;
        }

        input:hover {
            background-color: hsl(206, 23%, 93%);
            box-shadow: inset 2px 2px 4px hsl(217, 30%, 85%), inset -2px -2px 4px hsl(0, 0%, 97%);
        }

        label {
            display: block;
            margin-top: 2em;
        }

        svg {
            margin: 0 .3em;
        }

        .dis {
            background-color: #c0e9ff;
            color: #3f3f3f;
            margin: 2em .1em;
            padding: 1em 4em 1em 1em;
            border-radius: 1em;
            width: fit-content;
            display: flex;
            align-items: center;
        }

        button {
            padding: 1em 3em;
            border-radius: 25px;
            margin: 2em;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1.15px;
            background-color: #4B70E2;
            color: #f9f9f9;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #f9f9f9;
            border: none;
            outline: none;
            display: block;
        }

        button:hover {
            background-color: #3f5be2;
        }

        button:active {
            background-color: #2e4ad2;
        }

        .check {
            margin-top: .5em;
            margin-left: .5em;
        }

        .check label {
            display: inline-block;
            margin-top: .1em;
        }
    </style>
</head>

<body>
    <main>
        <div class="circle"></div>
        <div class="circle c2"></div>
        <h1>歡迎加入西苑資訊志工隊!</h1>
        <p>西苑資訊志工隊是西苑高中的資訊志工隊。西苑資訊志工隊員會在西苑提供資訊方面的志工協助，例如：設備維護，辦理營隊等等。<br>
            協助填寫以下表單讓我們更加認識你!</p>
        <label for="name">姓名</label>
        <input class="form__input" type="text" placeholder="如: 張三" id="name">
        <label for="classNo">班級座號</label>
        <input class="form__input" type="text" placeholder="如: 40802" id="classNo">
        <label>你有什麼特別的興趣/專長? </label>
        <div class="check">
            <input type="checkbox" id="skill1" />
            <label for="skill1">網頁設計(HTML, css, javaScript...)</label><br>
            <input type="checkbox" id="skill2" />
            <label for="skill2"></label>電腦硬體方面(了解電腦零件, 組電腦等等)</label><br>
            <input type="checkbox" id="skill3" />
            <label for="skill3">學過一個或以上程式語言(不用精通。ex:C++, Python, java, javascript...)</label><br>
            <input type="checkbox" id="skill5" />
            <label for="skill5">平面設計/電腦繪圖 (Canva不算)</label><br>
            <input type="checkbox" id="skill6" />
            <label for="skill6">文書處裡，很會打報告</label>
        </div>
        <label for="wish">希望我們可以做甚麼活動/學習到什麼? </label>
        <input class="form__input" type="text" placeholder="如: 學習如何做出和這一樣酷的網頁" id="wish">
        <button onclick="submit()">提交</button>
