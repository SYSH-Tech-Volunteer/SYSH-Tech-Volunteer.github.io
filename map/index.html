<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地圖 - 西苑高中資訊志工隊</title>
    <style>
        :root {
            --background: #35155D;
            --dark: #512B81;
            --medium: #4477CE;
            --light: #8CABFF;
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        main {
            margin: 0 auto;
            /* max-width: 1000px; */
            padding: 2rem;
            min-height: 100vh;
        }

        h1,
        h2 {
            text-align: center;
            color: var(--light);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--medium);
        }

        article {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin: 2rem 0;
            gap: 2em;
        }

        div {
            text-align: center;
            width: 30rem;
        }

        img {
            width: calc(50% - 2rem);
            text-align: right;
        }

        h3 {
            font-size: 3rem;
        }

        footer {
            text-align: center;
            margin: 2em 0;
            padding: 1.5em;
            background: var(--dark);
        }

        button {
            position: relative;
            display: inline-block;
            padding: 1em;
            margin: 2em;
            color: #03e9f4;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.5s;
            letter-spacing: 4px;
            overflow: hidden;
            font-size: 1rem;
            background: transparent;
            outline: transparent;
            border: none;

        }

        button:hover {
            background: #03e9f4;
            color: #050801;
            box-shadow: 0 0 5px #03e9f4,
                0 0 25px #03e9f4,
                0 0 50px #03e9f4,
                0 0 200px #03e9f4;
            -webkit-box-reflect: below 1px linear-gradient(transparent, #0005);
        }

        article button:nth-child(1) {
            filter: hue-rotate(270deg);
        }

        article button:nth-child(2) {
            filter: hue-rotate(110deg);
        }

        button span {
            position: absolute;
            display: block;
        }

        button span:nth-child(1) {
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #03e9f4);
            animation: animate1 1s linear infinite;
        }

        @keyframes animate1 {
            0% {
                left: -100%;
            }

            50%,
            100% {
                left: 100%;
            }
        }

        button span:nth-child(2) {
            top: -100%;
            right: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #03e9f4);
            animation: animate2 1s linear infinite;
            animation-delay: 0.25s;
        }

        @keyframes animate2 {
            0% {
                top: -100%;
            }

            50%,
            100% {
                top: 100%;
            }
        }

        button span:nth-child(3) {
            bottom: 0;
            right: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(270deg, transparent, #03e9f4);
            animation: animate3 1s linear infinite;
            animation-delay: 0.50s;
        }

        @keyframes animate3 {
            0% {
                right: -100%;
            }

            50%,
            100% {
                right: 100%;
            }
        }


        button span:nth-child(4) {
            bottom: -100%;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(360deg, transparent, #03e9f4);
            animation: animate4 1s linear infinite;
            animation-delay: 0.75s;
        }

        @keyframes animate4 {
            0% {
                bottom: -100%;
            }

            50%,
            100% {
                bottom: 100%;
            }
        }
        @media (max-width: 600px) {
            img{
                width: 100%;
            }
            
        }
    </style>
</head>

<body>
    <main>
        <h1>西苑高中地圖下載</h1>
        <h2>西苑高中資訊志工隊提供</h2>
        <section>
            <article>
                <div>
                    <h3>迎曦樓2F立體圖</h3>
                    <button onclick="dl('立體.png')"> <span></span>
                        <span></span>
                        <span></span>
                        <span></span>下載 PNG</button>
                    <button onclick="dl('立體向量.svg')"> <span></span>
                        <span></span>
                        <span></span>
                        <span></span>下載 SVG</button>
                </div>
                <img src="https://raw.githubusercontent.com/SYSH-Tech-Volunteer/map/main/%E7%AB%8B%E9%AB%94.png" alt="">
            </article>
            <article>
                <div>
                    <h3>迎曦樓2F平面圖</h3>
                    <button onclick="dl('平面.svg')"> <span></span>
                        <span></span>
                        <span></span>
                        <span></span>下載 SVG</button>
                    <button onclick="dl('2F.ai')"> <span></span>
                        <span></span>
                        <span></span>
                        <span></span>下載 AI</button>
                </div>
                <img src="https://raw.githubusercontent.com/SYSH-Tech-Volunteer/map/main/平面.svg" alt="">
            </article>
            <article>
                <div>
                    <h3>迎曦樓2F彩色平面圖</h3>
                    <button onclick="dl('彩色平面.svg')"> <span></span>
                        <span></span>
                        <span></span>
                        <span></span>下載 SVG</button>
                </div>
                <img src="https://raw.githubusercontent.com/SYSH-Tech-Volunteer/map/main/彩色平面.svg" alt="">
            </article>
            <article>
                <div>
                    <h3>迎曦樓2F空白圖</h3>
                    <button onclick="dl('平面空白.jpg')"> <span></span>
                        <span></span>
                        <span></span>
                        <span></span>下載 JPG</button>
                </div>
                <img src="https://raw.githubusercontent.com/SYSH-Tech-Volunteer/map/main/平面空白.jpg" alt="">
            </article>
            <article>
                <div>
                    <h3>迎曦樓2F傾斜圖</h3>
                    <button onclick="dl('傾斜.png')"> <span></span>
                        <span></span>
                        <span></span>
                        <span></span>下載 PNG</button>
                </div>
                <img src="https://raw.githubusercontent.com/SYSH-Tech-Volunteer/map/main/傾斜.png" alt="">
            </article>
        </section>
    </main>
    <footer>
        2023 西苑資訊志工隊<br>毛哥EM繪製
    </footer>
    <script>
        async function dl(imageSrc) {
            const response = await fetch('https://raw.githubusercontent.com/SYSH-Tech-Volunteer/map/main/' + imageSrc);
            const blobImage = await response.blob();
            const href = URL.createObjectURL(blobImage);
            const anchorElement = document.createElement('a');
            anchorElement.href = href;
            anchorElement.download = imageSrc;
            document.body.appendChild(anchorElement);
            anchorElement.click();
            document.body.removeChild(anchorElement);
            window.URL.revokeObjectURL(href);
        }
    </script>
</body>

</html>
